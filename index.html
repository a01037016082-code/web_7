<!DOCTYPE html>
<html>
<head>
    <title>7장 과제</title>
    <style>
        .container {
            width: 1080px;
            margin:0 auto;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .left {
            float: left;
            width: 740px;
            height: 428px;
            background-color: red;
        }

        .right {
            float: right;
            width: 332px;
            height: 428px;
            background-color: blue;
        }

        .gnb {
            float: left;
            padding: 8px 0;
            list-style-type: none;
            margin: 0;
        }  

        .gnb li {
            float: left;
            padding: 0 16px;
            background-color: green;
        }

        .gnb li:first-child {
            padding-left: 0;
        }

        .rank {
            float: right;
            padding: 8px;
            list-style-type: none;
            margin: 0;
        }

        .rank li {
            list-style: none;
            background-color: yellow;
        }

        .content-wrapper {
            width: 1080px;
            overflow: hidden;
        }

        .footer {
            width: 1080px;
            height: 80px;
            background-color: yellow;
        }

    </style>
</head>
<body>
    <div class="container">
        <ul class="gnb">
            <li>메일</li>
            <li>카페</li>
            <li>블로그</li>
            <li>쇼핑</li>
            <li>사전</li>
            <li>뉴스</li>
            <li>증권</li>
            <li>부동산</li>
            <li>지도</li>
        </ul>
        <ul class="rank">
            <li>실시간 검색 순위</li>
        </ul>
    </div>
    <div class="container">
        <div class="left"></div>
        <div class="right"></div>
    </div>
    <div class="container">
        <div class="left"></div>
        <div class="right"></div>
    </div>
    <div class="container">
        <div class="footer"></div>
    </div>
</body>
</html>
